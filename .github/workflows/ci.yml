name: build

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build launcher
        run: dotnet build src/OmniphonyLauncher/OmniphonyLauncher.csproj -c Release
      - name: Run smoke tests
        run: dotnet run --project tests/OmniphonyLauncher.SmokeTests/OmniphonyLauncher.SmokeTests.csproj -c Release
